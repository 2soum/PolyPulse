name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, build & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [poly-service, watch-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript)
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build poly-service image
        run: docker build -t polypulse/poly-service ./services/poly-service
      - name: Build watch-service image
        run: docker build -t polypulse/watch-service ./services/watch-service
      - name: Build frontend image
        run: docker build -t polypulse/frontend ./frontend
      - name: Validate docker-compose
        run: docker compose config

  sonarcloud:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Tests + couverture (poly-service)
        working-directory: services/poly-service
        run: npm ci && npm run test:coverage
      - name: Tests + couverture (watch-service)
        working-directory: services/watch-service
        run: npm ci && npm run test:coverage
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
