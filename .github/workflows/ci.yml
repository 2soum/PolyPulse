name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, build & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [sky-service, spot-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript)
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build sky-service image
        run: docker build -t astrospot/sky-service ./services/sky-service
      - name: Build spot-service image
        run: docker build -t astrospot/spot-service ./services/spot-service
      - name: Build frontend image
        run: docker build -t astrospot/frontend ./frontend
      - name: Validate docker-compose
        run: docker compose config
