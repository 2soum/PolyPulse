# SonarQube Cloud — PolyPulse (monorepo : 2 services back)
# /!\ Vérifie sonar.organization et sonar.projectKey sur l'écran de config SonarCloud
sonar.organization=2soum
sonar.projectKey=2soum_PolyPulse
sonar.projectName=PolyPulse

# Code source analysé (couches Data / Services / Controller des 2 services)
sonar.sources=services/poly-service/src,services/watch-service/src
sonar.tests=services/poly-service/test,services/watch-service/test
sonar.test.inclusions=**/*.test.ts

# Import de la couverture Jest (lcov) des deux services
sonar.javascript.lcov.reportPaths=services/poly-service/coverage/lcov.info,services/watch-service/coverage/lcov.info

# Exclusions (pas de code généré / tests / point d'entrée non testé par design)
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**
sonar.coverage.exclusions=**/*.test.ts,**/src/index.ts,**/postgresRepositories.ts

sonar.sourceEncoding=UTF-8
