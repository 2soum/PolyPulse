services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polypulse
      POSTGRES_PASSWORD: polypulse
      POSTGRES_DB: polypulse
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U polypulse']
      interval: 5s
      timeout: 3s
      retries: 10

  poly-service:
    build: ./services/poly-service
    environment:
      PORT: 3002
      GAMMA_BASE_URL: https://gamma-api.polymarket.com
    ports:
      - '3002:3002'

  watch-service:
    build: ./services/watch-service
    environment:
      PORT: 3001
      POLY_BASE_URL: http://poly-service:3002
      DATABASE_URL: postgres://polypulse:polypulse@postgres:5432/polypulse
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      poly-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - '8080:80'
    depends_on:
      - watch-service

volumes:
  pgdata:
