services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: astrospot
      POSTGRES_PASSWORD: astrospot
      POSTGRES_DB: astrospot
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U astrospot']
      interval: 5s
      timeout: 3s
      retries: 10

  sky-service:
    build: ./services/sky-service
    environment:
      PORT: 3002
      WEATHER_BASE_URL: https://api.open-meteo.com
    ports:
      - '3002:3002'

  spot-service:
    build: ./services/spot-service
    environment:
      PORT: 3001
      SKY_BASE_URL: http://sky-service:3002
      DATABASE_URL: postgres://astrospot:astrospot@postgres:5432/astrospot
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      sky-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - '8080:80'
    depends_on:
      - spot-service

volumes:
  pgdata:
