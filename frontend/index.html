<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PolyPulse — Surveillance des marchés boostés</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">◎</span>
        <div>
          <h1>PolyPulse</h1>
          <p>Surveillance des marchés <b>boostés</b> sur Polymarket</p>
        </div>
      </div>
      <div class="controls">
        <select id="category" title="Filtrer par catégorie">
          <option value="">Toutes catégories</option>
        </select>
        <label class="switch">
          <input type="checkbox" id="auto" /> <span>Auto 15s</span>
        </label>
        <button id="refresh" class="btn">↻ Rafraîchir</button>
      </div>
    </header>

    <section class="kpis" id="kpis"></section>

    <main class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2>Ma watchlist</h2>
          <span class="hint" id="watch-count"></span>
        </div>
        <div class="cards" id="watchlist"></div>
      </section>

      <aside class="panel discover">
        <div class="panel-head">
          <h2>Découvrir les boostés</h2>
          <span class="hint">top volume 24h</span>
        </div>
        <div class="discover-list" id="discover"></div>
      </aside>
    </main>

    <footer class="foot">
      PolyPulse · projet DevOps · <b>watch-service</b> ↔ <b>poly-service</b> ↔ Polymarket Gamma API
      <span id="status" class="status"></span>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
